---
layout: default
page_class: signal-post
full_bleed: true
hide_site_chrome: true
---
<article class="signal-post-shell post" itemscope itemtype="http://schema.org/BlogPosting">
  <div class="signal-post-shell__noise" aria-hidden="true"></div>
  <nav class="signal-post-nav" aria-label="Post navigation">
    <a class="signal-post-nav__link" href="{{ site.baseurl }}/">Return to home page</a>
  </nav>

  <header class="signal-post-header">
    <p class="signal-post-header__eyebrow">{{ site.title }} / {{ site.github_username }}</p>
    <h1 class="signal-post-header__title post-title" itemprop="name headline">{{ page.title }}</h1>
    <p class="signal-post-header__meta post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">{{ page.date | date: "%b %-d, %Y" }}</time>{% if page.author %} • <span itemprop="author" itemscope itemtype="http://schema.org/Person"><span itemprop="name">{{ page.author }}</span></span>{% endif %}
    </p>
  </header>

  <div class="signal-post-frame">
    <div class="signal-post-content post-content" itemprop="articleBody">
      {{ content }}
    </div>
  </div>
</article>
